name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the floor — Raspberry Pi OS Bullseye ships 3.9 and that is
        # the deployment target. 3.11 is Bookworm. 3.12/3.13 are forward-
        # compatibility coverage for future Pi OS releases and dev boxes.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q
